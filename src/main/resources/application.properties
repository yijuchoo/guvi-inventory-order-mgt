spring.application.name=inventory-order-mgt

# Server
server.port=9000

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.expirationMinutes=1440
app.jwt.secret=your_super_secret_key_here_must_be_at_least_32_chars

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

#logging.level.root=debug